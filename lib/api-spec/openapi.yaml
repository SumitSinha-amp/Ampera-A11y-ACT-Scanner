openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Accessibility Scanner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scans
    description: Accessibility scan operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scans:
    get:
      operationId: listScans
      tags: [scans]
      summary: List all scans
      description: Returns all scan sessions with summary info
      responses:
        "200":
          description: List of scans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanSession"

    post:
      operationId: createScan
      tags: [scans]
      summary: Create a new scan
      description: Start a new accessibility scan for one or more URLs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScanBody"
      responses:
        "201":
          description: Scan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanSession"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scans/{id}:
    get:
      operationId: getScan
      tags: [scans]
      summary: Get scan details
      description: Returns scan session with all page results and issues
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanSessionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteScan
      tags: [scans]
      summary: Delete a scan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scans/{id}/status:
    get:
      operationId: getScanStatus
      tags: [scans]
      summary: Get live scan status
      description: Returns current scan progress and per-URL status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatus"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scans/{id}/cancel:
    post:
      operationId: cancelScan
      tags: [scans]
      summary: Cancel an ongoing scan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scans/{id}/report:
    get:
      operationId: getScanReport
      tags: [scans]
      summary: Get scan report summary
      description: Returns aggregated issue counts and statistics for the scan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanReport"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scans/parse-sitemap:
    post:
      operationId: parseSitemap
      tags: [scans]
      summary: Parse a sitemap URL and return its URLs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseSitemapBody"
      responses:
        "200":
          description: List of URLs from sitemap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseSitemapResponse"
        "400":
          description: Invalid sitemap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ScanSession:
      type: object
      properties:
        id:
          type: integer
        name:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, running, completed, cancelled, failed]
        totalUrls:
          type: integer
        scannedUrls:
          type: integer
        failedUrls:
          type: integer
        totalIssues:
          type: integer
        criticalIssues:
          type: integer
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]
      required:
        - id
        - status
        - totalUrls
        - scannedUrls
        - failedUrls
        - totalIssues
        - criticalIssues
        - createdAt
        - completedAt
        - name

    ScanSessionDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, running, completed, cancelled, failed]
        totalUrls:
          type: integer
        scannedUrls:
          type: integer
        failedUrls:
          type: integer
        totalIssues:
          type: integer
        criticalIssues:
          type: integer
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]
        pages:
          type: array
          items:
            $ref: "#/components/schemas/PageResult"
      required:
        - id
        - status
        - totalUrls
        - scannedUrls
        - failedUrls
        - totalIssues
        - criticalIssues
        - createdAt
        - completedAt
        - pages
        - name

    PageResult:
      type: object
      properties:
        id:
          type: integer
        scanId:
          type: integer
        url:
          type: string
        status:
          type: string
          enum: [pending, scanning, completed, failed, skipped]
        issueCount:
          type: integer
        criticalCount:
          type: integer
        errorMessage:
          type: ["string", "null"]
        scannedAt:
          type: ["string", "null"]
        issues:
          type: array
          items:
            $ref: "#/components/schemas/AccessibilityIssue"
      required:
        - id
        - scanId
        - url
        - status
        - issueCount
        - criticalCount
        - errorMessage
        - scannedAt
        - issues

    AccessibilityIssue:
      type: object
      properties:
        id:
          type: integer
        pageId:
          type: integer
        ruleId:
          type: string
        impact:
          type: string
          enum: [critical, serious, moderate, minor]
        description:
          type: string
        element:
          type: ["string", "null"]
        wcagCriteria:
          type: ["string", "null"]
        wcagLevel:
          type: ["string", "null"]
        selector:
          type: ["string", "null"]
        remediation:
          type: ["string", "null"]
      required:
        - id
        - pageId
        - ruleId
        - impact
        - description
        - element
        - wcagCriteria
        - wcagLevel
        - selector
        - remediation

    ScanStatus:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [pending, running, completed, cancelled, failed]
        totalUrls:
          type: integer
        scannedUrls:
          type: integer
        failedUrls:
          type: integer
        currentUrl:
          type: ["string", "null"]
        pages:
          type: array
          items:
            $ref: "#/components/schemas/PageStatus"
      required:
        - id
        - status
        - totalUrls
        - scannedUrls
        - failedUrls
        - currentUrl
        - pages

    PageStatus:
      type: object
      properties:
        url:
          type: string
        status:
          type: string
          enum: [pending, scanning, completed, failed, skipped]
        issueCount:
          type: integer
        criticalCount:
          type: integer
        errorMessage:
          type: ["string", "null"]
      required:
        - url
        - status
        - issueCount
        - criticalCount
        - errorMessage

    ScanReport:
      type: object
      properties:
        scanId:
          type: integer
        totalPages:
          type: integer
        scannedPages:
          type: integer
        failedPages:
          type: integer
        totalIssues:
          type: integer
        issuesByImpact:
          $ref: "#/components/schemas/IssuesByImpact"
        issuesByWcagLevel:
          $ref: "#/components/schemas/IssuesByWcagLevel"
        topRules:
          type: array
          items:
            $ref: "#/components/schemas/RuleCount"
        pagesWithMostIssues:
          type: array
          items:
            $ref: "#/components/schemas/PageIssueCount"
      required:
        - scanId
        - totalPages
        - scannedPages
        - failedPages
        - totalIssues
        - issuesByImpact
        - issuesByWcagLevel
        - topRules
        - pagesWithMostIssues

    IssuesByImpact:
      type: object
      properties:
        critical:
          type: integer
        serious:
          type: integer
        moderate:
          type: integer
        minor:
          type: integer
      required:
        - critical
        - serious
        - moderate
        - minor

    IssuesByWcagLevel:
      type: object
      properties:
        A:
          type: integer
        AA:
          type: integer
        AAA:
          type: integer
      required:
        - A
        - AA
        - AAA

    RuleCount:
      type: object
      properties:
        ruleId:
          type: string
        count:
          type: integer
        description:
          type: string
      required:
        - ruleId
        - count
        - description

    PageIssueCount:
      type: object
      properties:
        url:
          type: string
        issueCount:
          type: integer
        criticalCount:
          type: integer
      required:
        - url
        - issueCount
        - criticalCount

    CreateScanBody:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
        name:
          type: ["string", "null"]
        options:
          $ref: "#/components/schemas/ScanOptions"
      required:
        - urls

    ScanOptions:
      type: object
      properties:
        waitForNetworkIdle:
          type: boolean
        timeout:
          type: integer
        maxConcurrency:
          type: integer
        bypassCSP:
          type: boolean
        stealthMode:
          type: boolean
      required: []

    ParseSitemapBody:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    ParseSitemapResponse:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
        count:
          type: integer
      required:
        - urls
        - count
